<div
  class="order-card"
  [class.hidden-order]="order?.hidden"
  [class.sell-card]="isSelling && !auction"
  [class.buy-card]="!isSelling && !auction"
  [class.auction-card]="auction"
  [class.compact-card]="compact"
  [class.menu-open]="menuOpen"
>
  <!-- Main Row: Item + Qty + Price -->
  <div class="order-main">
    <!-- Item Thumbnail & Qty -->
    <div class="order-item" (click)="onItemClick()">
      <img class="order-img" [src]="imageSource" [alt]="order?.name" />
    </div>

    <div class="order-qty">
      <span class="qty-value">{{ order?.quantity }}</span>
      <span class="qty-label">qty</span>
    </div>

    <!-- Item Info -->
    <div class="order-info">
      <span class="order-name" [title]="order?.name" (click)="onItemClick()">{{ order?.name }}</span>
      <app-item-details *ngIf="showDetails" [item]="order" [details]="order?.item"></app-item-details>
      <span class="desc-preview" *ngIf="order?.description && showDetails">{{ order.description }}</span>
    </div>

    <!-- Price Classic -->
    <div class="order-price" *ngIf="!auction">
      <div class="price-row" *ngFor="let price of order?.prices">
        <img class="price-icon" [src]="price.type | currencySource" />
        <span class="price-amount">{{ price.price }}</span>
      </div>
    </div>

    <!-- Price Auction -->
    <div class="order-price" *ngIf="auction">
      <div class="price-row">
        <img class="price-icon" [src]="auction.currency | currencySource" />
        <span class="price-amount">{{
          auction.history?.[auction.history.length - 1]?.bid || auction.startingPrice
        }}</span>
      </div>
    </div>

    <button class="action-btn edit" (click)="onAuctionClick()" title="Inspect" *ngIf="auction">
      <i class="fa fa-info-circle"></i>
    </button>
    <button
      *ngIf="auction && !auction.active"
      class="action-btn danger"
      [class.confirm]="auction?.cloturate"
      (click)="onCloturateClick()"
      (mouseleave)="onCloturateLeave()"
      title="Cloturate"
    >
      <i class="fa fa-trash"></i>
    </button>

    <!-- Actions (full) -->
    <div class="order-actions" *ngIf="!locked && !compact">
      <button class="action-btn edit" (click)="onEditClick()" title="Edit" *ngIf="!auction">
        <i class="fa fa-pen"></i>
      </button>
      <button
        class="action-btn visibility"
        [class.active]="order?.hidden"
        (click)="onHideClick()"
        [title]="order?.hidden ? 'Show' : 'Hide'"
      >
        <i class="fa" [class.fa-eye]="!order?.hidden" [class.fa-eye-slash]="order?.hidden"></i>
      </button>
      <button
        *ngIf="isSingleRemoval && !auction"
        class="action-btn success"
        [class.confirm]="order?.single"
        (click)="onSingleClick()"
        (mouseleave)="onSingleLeave()"
        title="Complete one"
      >
        <i class="fa fa-check"></i>
      </button>
      <button
        class="action-btn success"
        [class.confirm]="order?.completed"
        (click)="onCompleteClick()"
        (mouseleave)="onCompleteLeave()"
        [title]="completeTitle"
      >
        <i class="fa fa-check-double"></i>
      </button>
      <button
        class="action-btn danger"
        [class.confirm]="order?.removed"
        (click)="onRemoveClick()"
        (mouseleave)="onRemoveLeave()"
        title="Remove"
      >
        <i class="fa fa-trash"></i>
      </button>
    </div>

    <!-- Actions (compact dropdown) -->
    <div class="order-actions-compact" *ngIf="!locked && compact">
      <button class="action-btn menu-btn" (click)="toggleMenu($event)" title="Actions">
        <i class="fa fa-ellipsis-v"></i>
      </button>
      <div class="actions-dropdown" *ngIf="menuOpen" (click)="$event.stopPropagation()">
        <div class="dropdown-inner">
          <button class="dropdown-item" *ngIf="!auction" (click)="onEditClick(); closeMenu()">
            <i class="fa fa-pen"></i> Edit
          </button>
          <button class="dropdown-item" *ngIf="!auction" (click)="onHideClick(); closeMenu()">
            <i class="fa" [class.fa-eye]="!order?.hidden" [class.fa-eye-slash]="order?.hidden"></i>
            {{ order?.hidden ? 'Show' : 'Hide' }}
          </button>
          <button
            *ngIf="!auction && isSingleRemoval"
            class="dropdown-item success"
            [class.confirm]="order?.single"
            (click)="onSingleClick()"
            (mouseleave)="onSingleLeave()"
          >
            <i class="fa fa-check"></i> Complete one
          </button>
          <button
            *ngIf="!auction"
            class="dropdown-item success"
            [class.confirm]="order?.completed"
            (click)="onCompleteClick()"
            (mouseleave)="onCompleteLeave()"
          >
            <i class="fa fa-check"></i> {{ completeTitle }}
          </button>
          <button
            *ngIf="!auction || (auction && !auction.active)"
            class="dropdown-item danger"
            [class.confirm]="order?.removed"
            (click)="onRemoveClick()"
            (mouseleave)="onRemoveLeave()"
          >
            <i class="fa fa-trash"></i> Remove
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
